<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow — Immersive 3D</title>
<style>
  :root{
    --mint:#4dffc3; --citrus:#ffd24d; --berry:#c04dff;
    --ice:#4dc9ff; --ember:#ff6b4d; --rose:#ff4d9e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#eaeaea;font-family:"Helvetica Neue",Arial,sans-serif;overflow-x:hidden}

  #gl{position:fixed;inset:0;width:100%;height:100%;z-index:0}

  /* scroll track: gives the page height; stage content is fixed */
  #track{height:640vh}

  .overlay{position:fixed;inset:0;z-index:2;pointer-events:none}

  h1#headline{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);
      font-size:clamp(38px,7vw,92px);font-weight:200;letter-spacing:.04em;white-space:nowrap}
  h1#headline .L{display:inline-block;opacity:.06}
  h1#headline .L.lit{opacity:1;color:#fff;
      text-shadow:0 0 8px var(--mint),0 0 30px var(--mint),0 0 70px var(--mint)}

  .panel{position:absolute;left:50%;top:70%;transform:translateX(-50%);opacity:0;text-align:center;
      width:min(560px,90vw);pointer-events:auto}
  .panel .setname{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:#888;margin-bottom:16px}
  .panel .setname b{color:#fff;font-weight:500}
  .strengths{display:flex;gap:12px;justify-content:center}
  .strengths button, .cta{background:#111a;border:1px solid #333;color:#ccc;border-radius:24px;
      padding:9px 20px;font-size:12px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;
      transition:.25s;backdrop-filter:blur(8px)}
  .strengths button:hover,.cta:hover{border-color:var(--ac,var(--mint));color:#fff;
      box-shadow:0 0 18px color-mix(in srgb,var(--ac,var(--mint)) 40%,transparent)}
  .strengths button.on{background:color-mix(in srgb,var(--ac,var(--mint)) 16%,#111);border-color:var(--ac,var(--mint));color:#fff}
  .panel .cta{margin-top:18px;border-color:#444}

  #logoEnd{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);text-align:center;opacity:0}
  #logoEnd .word{font-size:clamp(44px,6vw,84px);font-weight:200;letter-spacing:.34em;color:#fff;
      text-shadow:0 0 20px var(--mint),0 0 60px var(--mint)}
  #logoEnd .cta{pointer-events:auto;margin-top:34px;padding:13px 34px;backdrop-filter:none}

  .hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);font-size:11px;color:#555;
      letter-spacing:.25em;text-transform:uppercase;animation:hb 2.2s ease-in-out infinite}
  @keyframes hb{0%,100%{opacity:.4}50%{opacity:1}}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<canvas id="gl"></canvas>
<div id="track"></div>

<div class="overlay">
  <h1 id="headline">Find your Glow</h1>

  <div class="panel" id="panelA" style="--ac:var(--mint)">
    <div class="setname">Set 01 — <b>Mint · Citrus · Berry</b></div>
    <div class="strengths">
      <button data-em="0.55">3 mg</button><button class="on" data-em="1.3">6 mg</button><button data-em="3">12 mg</button>
    </div>
    <button class="cta">Interested</button>
  </div>

  <div class="panel" id="panelB" style="--ac:var(--ice)">
    <div class="setname">Set 02 — <b>Ice · Ember · Rose</b></div>
    <div class="strengths">
      <button data-em="0.55">3 mg</button><button class="on" data-em="1.3">6 mg</button><button data-em="3">12 mg</button>
    </div>
    <button class="cta">Interested</button>
  </div>

  <div id="logoEnd">
    <div class="word">GLOW</div>
    <button class="cta">Find your Glow</button>
  </div>

  <div class="hint">Scroll</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

gsap.registerPlugin(ScrollTrigger);

/* ================= renderer / scene ================= */
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.055);

const camera = new THREE.PerspectiveCamera(38, 1, .1, 100);
const camState = {x:0, y:1.1, z:11, tx:0, ty:0, tz:0};   // position + lookAt target, gsap-driven

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(1,1), 1.15, .65, .12);
composer.addPass(bloom);

function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  composer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', ()=>{
  resize();
  STACK_X = stackX();
  // re-seat stacks only while still in the rest state
  if(tl && tl.scrollTrigger && tl.scrollTrigger.progress < .02){
    lefts.forEach(g=>g.position.x = -STACK_X);
    rights.forEach(g=>g.position.x = STACK_X);
  }
});
resize();

/* ================= lights / floor / dust ================= */
scene.add(new THREE.AmbientLight(0x223028, .55));
const key = new THREE.DirectionalLight(0x8fffe0, .35); key.position.set(4,8,6); scene.add(key);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(40, 48),
  new THREE.MeshStandardMaterial({color:0x050505, roughness:.32, metalness:.85})
);
floor.rotation.x = -Math.PI/2; floor.position.y = -1.15; scene.add(floor);

const dustGeo = new THREE.BufferGeometry();
const N = 900, dpos = new Float32Array(N*3);
for(let i=0;i<N;i++){
  dpos[i*3]   = (Math.random()-.5)*46;
  dpos[i*3+1] = Math.random()*11 - 1;
  dpos[i*3+2] = (Math.random()-.5)*34 - 4;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dpos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color:0x4dffc3, size:.035, transparent:true, opacity:.5, depthWrite:false}));
scene.add(dust);

/* ================= pucks (placeholder — swap GLB per flavor here) ================= */
const FLAVORS = [
  {n:'mint',   c:0x4dffc3, side:'L', row:0},
  {n:'citrus', c:0xffd24d, side:'L', row:1},
  {n:'berry',  c:0xc04dff, side:'L', row:2},
  {n:'ice',    c:0x4dc9ff, side:'R', row:0},
  {n:'ember',  c:0xff6b4d, side:'R', row:1},
  {n:'rose',   c:0xff4d9e, side:'R', row:2},
];
const ROW_Y = [1.55, .2, -1.15];
/* center-row slot spacing, kept inside frame at the parked camera distance (z≈6.6) */
function slotX(i){
  const visHalf = Math.tan(THREE.MathUtils.degToRad(camera.fov/2)) * 6.6 * camera.aspect;
  const s = Math.min(2.1, Math.max(1.15, visHalf - .95));
  return [-s, 0, s][i];
}
/* keep edge stacks inside the camera frustum at rest (camera z=11, pucks z=0) */
function stackX(){
  const visHalf = Math.tan(THREE.MathUtils.degToRad(camera.fov/2)) * 11 * camera.aspect;
  return Math.min(6.4, Math.max(2.35, visHalf - 1.45)); // keep puck + parallax drift inside frame
}
let STACK_X = stackX();

const puckGeo = new THREE.CylinderGeometry(.62, .62, .3, 48, 1);
const rimGeo  = new THREE.TorusGeometry(.62, .035, 12, 48);

const pucks = FLAVORS.map(f=>{
  const g = new THREE.Group();
  const body = new THREE.Mesh(puckGeo, new THREE.MeshPhysicalMaterial({
    color:0x0e0e0e, roughness:.28, metalness:.6, clearcoat:.8, clearcoatRoughness:.25,
    transparent:true}));
  const core = new THREE.Mesh(
    new THREE.CylinderGeometry(.4,.4,.31,48),
    new THREE.MeshBasicMaterial({color:f.c, transparent:true, opacity:.95}));
  const rim = new THREE.Mesh(rimGeo, new THREE.MeshBasicMaterial({color:f.c, transparent:true, opacity:.8}));
  rim.rotation.x = Math.PI/2;
  const light = new THREE.PointLight(f.c, 1.4, 7, 2);
  light.position.y = .4;
  g.add(body, core, rim, light);
  g.userData = {f, body, core, rim, light, em:1.3};
  const x = f.side==='L' ? -STACK_X : STACK_X;
  g.position.set(x, ROW_Y[f.row], 0);
  g.rotation.x = .28;                       // slight face-up tilt
  scene.add(g);
  return g;
});
const lefts  = pucks.slice(0,3), rights = pucks.slice(3);

/* em ranges over the three mg buttons: .55 (3mg) .. 3 (12mg) */
function emLevel(v){ return (v - .55) / (3 - .55); }   // 0..1
function coreOpacityFor(v){ return .4 + emLevel(v)*.6; }   // .4 .. 1
function rimOpacityFor(v){ return .45 + emLevel(v)*.55; }  // .45 .. 1
function coreScaleFor(v){ return .85 + emLevel(v)*.35; }   // .85 .. 1.2

function setEmission(group, v){
  group.userData.em = v;
  group.userData.light.intensity = 1 + emLevel(v)*4;
  group.userData.core.material.opacity = coreOpacityFor(v);
  group.userData.rim.material.opacity = rimOpacityFor(v);
  group.userData.core.scale.setScalar(coreScaleFor(v));
  group.userData.rim.scale.setScalar(coreScaleFor(v));
  bloomKick(v);
}
let bloomBoost = 0;
function bloomKick(v){ bloomBoost = v===undefined ? .55 : .3 + emLevel(v)*1.1; }

function setPuckOpacity(g, v){
  g.userData.body.material.opacity = v;
  g.userData.core.material.opacity = v * coreOpacityFor(g.userData.em);
  g.userData.rim.material.opacity = v * rimOpacityFor(g.userData.em);
  g.userData.light.intensity = v * (1 + emLevel(g.userData.em)*4);
  g.visible = v > .01;
}

/* ================= DOM: neon headline ================= */
const headline = document.getElementById('headline');
(function splitNeon(){
  const text = headline.textContent; headline.textContent = '';
  [...text].forEach(ch=>{
    if(ch===' '){ headline.appendChild(document.createTextNode(' ')); return; }
    const s = document.createElement('span'); s.className='L'; s.textContent=ch;
    headline.appendChild(s);
  });
  [...headline.querySelectorAll('.L')].forEach((L,i)=>{
    const base = 350 + i*85 + Math.random()*240;
    const flicks = 2+Math.floor(Math.random()*4);
    for(let f=0; f<flicks; f++){
      setTimeout(()=>L.classList.add('lit'),  base + f*110 + Math.random()*50);
      setTimeout(()=>L.classList.remove('lit'), base + f*110 + 45 + Math.random()*40);
    }
    setTimeout(()=>L.classList.add('lit'), base + flicks*125 + 90);
  });
})();

/* ================= scrubbed master timeline ================= */
gsap.set('#panelA, #panelB', {y:24, autoAlpha:0});

const tl = gsap.timeline({
  defaults:{ease:'none'},
  scrollTrigger:{
    trigger:'#track', start:'top top', end:'bottom bottom',
    scrub:1, invalidateOnRefresh:true,
    snap:{snapTo:'labelsDirectional', duration:{min:.25,max:.7}, ease:'power1.inOut'}
  }
});

tl.addLabel('rest')
  .to({}, {duration:.4})
  .addLabel('assembleStart')
  .to(headline, {opacity:0, y:-80, scale:.85, duration:1.1, ease:'power2.inOut'}, 'assembleStart')
  .to(camState, {z:8.2, y:.75, duration:2.4, ease:'power1.inOut'}, 'assembleStart');

/* phase A: left stack -> center row. flight = arc toward camera + spin */
lefts.forEach((g,i)=>{
  const pos = 'assembleStart+=' + (.2 + i*.42);
  tl.to(g.position, {x:()=>slotX(i)*.45 - 1.4, y:.9, z:2.6, duration:.7, ease:'power2.in'}, pos)
    .to(g.rotation, {y:Math.PI*2.2, x:.9, duration:1.25, ease:'power1.inOut'}, pos)
    .to(g.position, {x:()=>slotX(i), y:.2, z:0, duration:.55, ease:'back.out(1.7)'}, '>-.55')
    .to(g.rotation, {x:.28, y:Math.PI*2.5, duration:.4, ease:'power2.out'}, '>-.2');
});

tl.addLabel('setA', '>.15')
  .to('#panelA', {autoAlpha:1, y:0, duration:.35, ease:'power2.out'}, 'setA-=.2')
  .to(camState, {z:6.6, y:.45, ty:.1, duration:1.2, ease:'power1.inOut'}, 'setA-=.6')
  .to({}, {duration:1.15})
  .addLabel('handoffStart')
  .to('#panelA', {autoAlpha:0, y:-18, duration:.3, ease:'power2.in'}, 'handoffStart')
  .to(camState, {x:1.6, z:7.4, duration:2.2, ease:'power1.inOut'}, 'handoffStart');  // lateral drift during swap

/* crossover: lefts exit far left w/ spin+fade, rights sweep in */
lefts.forEach((g,i)=>{
  const pos = 'handoffStart+=' + (.12 + i*.3);
  const prox = {v:1};
  tl.to(g.position, {x:-11, y:.6, z:1.6, duration:.8, ease:'power2.in'}, pos)
    .to(g.rotation, {y:'+=4', duration:.8, ease:'power2.in'}, pos)
    .to(prox, {v:0, duration:.55, ease:'power2.in',
        onUpdate:()=>setPuckOpacity(g, prox.v)}, pos+'+=.25');
});
rights.forEach((g,i)=>{
  const pos = 'handoffStart+=' + (.55 + i*.42);
  tl.to(g.position, {x:()=>slotX(i)*.45 + 1.4, y:.9, z:2.6, duration:.7, ease:'power2.in'}, pos)
    .to(g.rotation, {y:-Math.PI*2.2, x:.9, duration:1.25, ease:'power1.inOut'}, pos)
    .to(g.position, {x:()=>slotX(i), y:.2, z:0, duration:.55, ease:'back.out(1.7)'}, '>-.55')
    .to(g.rotation, {x:.28, y:-Math.PI*2.5, duration:.4, ease:'power2.out'}, '>-.2');
});

tl.addLabel('setB', '>.15')
  .to('#panelB', {autoAlpha:1, y:0, duration:.35, ease:'power2.out'}, 'setB-=.2')
  .to(camState, {x:0, z:6.6, duration:1, ease:'power1.inOut'}, 'setB-=.5')
  .to({}, {duration:1.15})
  .addLabel('finaleStart')
  .to('#panelB', {autoAlpha:0, y:-18, duration:.3, ease:'power2.in'}, 'finaleStart')
  .to(camState, {z:10.5, y:1.6, ty:.2, duration:2.6, ease:'power1.inOut'}, 'finaleStart');

/* finale: all six form a slow ring, then collapse to core */
pucks.forEach((g,i)=>{
  const a = (i/6)*Math.PI*2 - Math.PI/2;
  const prox = {v:0};
  const pos = 'finaleStart+=' + (.1 + i*.12);
  tl.to(prox, {v:1, duration:.4, ease:'power1.out',
      onUpdate:()=>setPuckOpacity(g, Math.max(prox.v, g.visible && i>=3 ? 1 : prox.v))}, pos)
    .to(g.position, {x:Math.cos(a)*2.6, y:.9 + Math.sin(a)*.9, z:0, duration:1.1, ease:'power2.inOut'}, pos)
    .to(g.rotation, {x:0, y:(i%2? -1:1)*Math.PI*1.5, duration:1.1, ease:'power1.inOut'}, pos);
});
tl.addLabel('ring', '>.1')
  .to({}, {duration:.5});
pucks.forEach((g,i)=>{
  const prox = {v:1};
  tl.to(g.position, {x:0, y:.6, z:0, duration:.8, ease:'power3.in'}, 'ring+=.1')
    .to(g.scale, {x:.06, y:.06, z:.06, duration:.8, ease:'power3.in'}, 'ring+=.1')
    .to(prox, {v:0, duration:.25, ease:'none', onUpdate:()=>setPuckOpacity(g, prox.v)}, 'ring+=.68');
});
tl.to('#logoEnd', {opacity:1, duration:.5, ease:'power2.out',
      onStart:bloomKick, onReverseComplete:()=>gsap.set('#logoEnd',{opacity:0})}, 'ring+=.85')
  .addLabel('end')
  .to({}, {duration:.3});

/* ================= interactions ================= */
function wireStrengths(panelId, group){
  const panel = document.getElementById(panelId);
  panel.querySelectorAll('.strengths button').forEach(b=>{
    b.addEventListener('click', ()=>{
      panel.querySelectorAll('.strengths button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      group.forEach(g=>setEmission(g, parseFloat(b.dataset.em)));
    });
  });
  panel.querySelector('.cta').addEventListener('click', function(){ this.textContent='Noted ✓'; bloomKick(); });
}
wireStrengths('panelA', lefts);
wireStrengths('panelB', rights);
pucks.forEach(g=>{
  g.userData.core.material.opacity = coreOpacityFor(g.userData.em);
  g.userData.rim.material.opacity = rimOpacityFor(g.userData.em);
  g.userData.core.scale.setScalar(coreScaleFor(g.userData.em));
  g.userData.rim.scale.setScalar(coreScaleFor(g.userData.em));
});

/* pointer parallax */
const par = {x:0, y:0};
addEventListener('pointermove', e=>{
  par.x = (e.clientX/innerWidth - .5);
  par.y = (e.clientY/innerHeight - .5);
});

/* drag to spin the parked row */
let dragging = false, lastX = 0, spinVel = 0;
addEventListener('pointerdown', e=>{ if(e.target.tagName!=='BUTTON'){ dragging=true; lastX=e.clientX; }});
addEventListener('pointerup',   ()=> dragging=false);
addEventListener('pointermove', e=>{ if(dragging){ spinVel += (e.clientX-lastX)*.0018; lastX=e.clientX; }});

/* ================= render loop ================= */
const clock = new THREE.Clock();
const smooth = {x:0, y:0};
function tick(){
  const t = clock.getElapsedTime();
  smooth.x += (par.x - smooth.x)*.05;
  smooth.y += (par.y - smooth.y)*.05;

  camera.position.set(camState.x + smooth.x*1.1, camState.y - smooth.y*.7, camState.z);
  camera.lookAt(camState.tx, camState.ty, camState.tz);

  dust.rotation.y = t*.008;

  spinVel *= .93;
  pucks.forEach((g,i)=>{
    g.rotation.y += spinVel;
    g.position.y += Math.sin(t*1.1 + i*1.3)*.0009;   // idle float
    g.userData.core.material.color.offsetHSL(0,0,0);
    const pulse = 1 + Math.sin(t*1.6 + i)*.08;
    g.userData.light.intensity = (1 + emLevel(g.userData.em)*4)*pulse * (g.visible?1:0) *
        Math.max(g.userData.body.material.opacity, 0);
  });

  bloomBoost *= .94;
  bloom.strength = 1.15 + bloomBoost;

  composer.render();
  requestAnimationFrame(tick);
}
tick();

/* pane can load hidden with zero-size viewport */
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden){ resize(); ScrollTrigger.refresh(); }
});

/* debug handle (harmless in production) */
window.__glow = {scene, camera, pucks, tl, get stackX(){return STACK_X}, camState};
</script>
</body>
</html>
